<!DOCTYPE html>
<html lang="en" class="bg-[#0a0a0c]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>POXY WORLD — Collectible Passport</title>
    <meta
      name="description"
      content="POXY WORLD — a premium dark glass collectible game. Browse your poxies, inspect their DNA, and trade on the market."
    />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap");
      html,
      body {
        margin: 0;
        background: #0a0a0c;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: rgba(255, 255, 255, 0.82);
      }
      .font-mono {
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 8px;
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal-in {
        animation: modalIn 200ms ease forwards;
      }
      .fade-in {
        animation: fadeIn 150ms ease forwards;
      }
      .crossfade {
        animation: fadeIn 150ms ease forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef } = React;

      /* ━━━ RARITY SYSTEM ━━━ */
      const RARITY = {
        Common: { color: "#b4b2a9", pct: 40 },
        Uncommon: { color: "#5dcaa5", pct: 28 },
        Rare: { color: "#378add", pct: 18 },
        Epic: { color: "#7f77dd", pct: 9 },
        Legendary: { color: "#ef9f27", pct: 4 },
        Mythic: { color: "#9a5fa8", pct: 1, gradient: true },
      };

      /* ━━━ GEM SVG — polygon layered crystal, no svg gradients ━━━ */
      function Gem({ rarity, size = 72 }) {
        const c = RARITY[rarity].color;
        const isMythic = RARITY[rarity].gradient;
        // for mythic we blend three faces with distinct hues
        const faces = isMythic
          ? ["#d4537e", "#7f77dd", "#378add"]
          : [c, c, c];
        return (
          <svg
            width={size}
            height={size}
            viewBox="0 0 100 100"
            style={{ display: "block", position: "relative", zIndex: 2 }}
          >
            {/* bottom face — shadowed */}
            <polygon points="50,95 18,52 82,52" fill={faces[2]} opacity="0.9" />
            <polygon
              points="50,95 18,52 82,52"
              fill="rgba(0,0,0,0.35)"
            />
            {/* left top face */}
            <polygon points="50,8 18,52 50,52" fill={faces[0]} opacity="0.85" />
            {/* right top face */}
            <polygon points="50,8 82,52 50,52" fill={faces[1]} opacity="0.7" />
            <polygon
              points="50,8 82,52 50,52"
              fill="rgba(0,0,0,0.18)"
            />
            {/* top edge highlight */}
            <polygon
              points="50,8 18,52 50,52"
              fill="rgba(255,255,255,0.22)"
            />
            {/* center inner light */}
            <circle cx="50" cy="50" r="3.4" fill="rgba(255,255,255,0.4)" />
            {/* facet edge lines */}
            <g stroke="rgba(255,255,255,0.12)" strokeWidth="0.6" fill="none">
              <line x1="50" y1="8" x2="50" y2="95" />
              <line x1="18" y1="52" x2="82" y2="52" />
            </g>
          </svg>
        );
      }

      /* glow ellipse beneath a gem */
      function Glow({ rarity, w, h, opacity, blur, bottom }) {
        const c = RARITY[rarity].color;
        return (
          <div
            style={{
              position: "absolute",
              left: "50%",
              bottom: bottom,
              transform: "translateX(-50%)",
              width: w,
              height: h,
              background: c,
              opacity: opacity,
              filter: `blur(${blur}px)`,
              borderRadius: "50%",
              zIndex: 1,
              pointerEvents: "none",
            }}
          />
        );
      }

      function RarityBadge({ rarity, size = 8 }) {
        const c = RARITY[rarity].color;
        return (
          <span
            style={{
              fontSize: size,
              letterSpacing: "0.2em",
              padding: "4px 10px",
              borderRadius: 20,
              textTransform: "uppercase",
              background: hexA(c, 0.09),
              border: `0.5px solid ${hexA(c, 0.18)}`,
              color: hexA(c, 0.75),
            }}
          >
            {rarity}
          </span>
        );
      }

      /* hex + alpha helper */
      function hexA(hex, a) {
        const h = hex.replace("#", "");
        const r = parseInt(h.substring(0, 2), 16);
        const g = parseInt(h.substring(2, 4), 16);
        const b = parseInt(h.substring(4, 6), 16);
        return `rgba(${r},${g},${b},${a})`;
      }

      /* ━━━ DATA ━━━ */
      const POXIES = [
        {
          name: "Vesper",
          rarity: "Mythic",
          serial: "0001 / 0100",
          minted: "Mar 02, 2024",
          owner: "0x4f…a91c",
          hash: "9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08",
          traits: ["Voidborn", "Prismatic", "Eternal"],
          lore: "Forged in the silence before the first dawn, Vesper carries light no eye was meant to see. Collectors whisper that its facets remember every owner who ever held it.",
        },
        {
          name: "Cinder",
          rarity: "Legendary",
          serial: "0042 / 0400",
          minted: "Apr 18, 2024",
          owner: "0x4f…a91c",
          hash: "2c26b46b68ffc68ff99b453c1d30413413422d706483bfa0f98a5e886266e7ae",
          traits: ["Ember", "Molten Core"],
          lore: "A spark that refused to die. Cinder glows warmest in the hands of those who have lost everything and rebuilt it twice.",
        },
        {
          name: "Aether",
          rarity: "Epic",
          serial: "0118 / 0900",
          minted: "May 09, 2024",
          owner: "0x4f…a91c",
          hash: "fcde2b2edba56bf408601fb721fe9b5c338d10ee429ea04fae5511b68fbf8fb9",
          traits: ["Drifting", "Lucid"],
          lore: "Aether exists half in this world and half in the next. Those who meditate near it report dreams of cities that have not yet been built.",
        },
        {
          name: "Marrow",
          rarity: "Rare",
          serial: "0231 / 1800",
          minted: "May 27, 2024",
          owner: "0x4f…a91c",
          hash: "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b",
          traits: ["Hollow", "Tempered"],
          lore: "Cut from the deep strata where pressure becomes patience. Marrow rewards the steady and ignores the hurried.",
        },
        {
          name: "Fern",
          rarity: "Uncommon",
          serial: "0540 / 2800",
          minted: "Jun 11, 2024",
          owner: "0x4f…a91c",
          hash: "d4735e3a265e16eee03f59718b9b5d03019c07d8b6c51f90da3a666eec13ab35",
          traits: ["Verdant"],
          lore: "The quiet one. Fern asks for nothing and grows anyway, a small green truth in a collection of louder things.",
        },
        {
          name: "Dust",
          rarity: "Common",
          serial: "1204 / 4000",
          minted: "Jun 22, 2024",
          owner: "0x4f…a91c",
          hash: "4e07408562bedb8b60ce05c1decfe3ad16b72230967de01f640b7e4729b49fce",
          traits: ["Weathered"],
          lore: "Every great collection begins here. Dust is humble, plentiful, and the first poxy most collectors ever loved.",
        },
      ];

      const MARKET = [
        { name: "Solace", rarity: "Legendary", price: 1840 },
        { name: "Quill", rarity: "Epic", price: 847 },
        { name: "Tide", rarity: "Rare", price: 312 },
        { name: "Pebble", rarity: "Uncommon", price: 96 },
      ];

      /* ━━━ AMBIENT BACKGROUND ━━━ */
      function Ambient() {
        return (
          <div
            style={{
              position: "fixed",
              inset: 0,
              zIndex: 0,
              pointerEvents: "none",
              overflow: "hidden",
            }}
          >
            <div
              style={{
                position: "absolute",
                top: "-120px",
                left: "-120px",
                width: 400,
                height: 400,
                background: "rgba(127,119,221,0.065)",
                filter: "blur(120px)",
                borderRadius: "50%",
              }}
            />
            <div
              style={{
                position: "absolute",
                bottom: "-100px",
                right: "-100px",
                width: 350,
                height: 350,
                background: "rgba(239,159,39,0.04)",
                filter: "blur(110px)",
                borderRadius: "50%",
              }}
            />
          </div>
        );
      }

      /* glass surface base style */
      const glass = (layer = 0.025) => ({
        background: `rgba(255,255,255,${layer})`,
        border: "0.5px solid rgba(255,255,255,0.07)",
        position: "relative",
      });
      function TopHighlight({ radius = 20, color = "rgba(255,255,255,0.1)" }) {
        return (
          <div
            style={{
              position: "absolute",
              top: 0,
              left: radius,
              right: radius,
              height: 1,
              background: color,
              borderRadius: 1,
              pointerEvents: "none",
            }}
          />
        );
      }

      /* ━━━ LOGO MARK — soft 4-pointed star ━━━ */
      function Logo() {
        return (
          <svg width="22" height="22" viewBox="0 0 100 100">
            <path
              d="M50 4 C54 36 64 46 96 50 C64 54 54 64 50 96 C46 64 36 54 4 50 C36 46 46 36 50 4 Z"
              fill="#c8c8c8"
            />
            <circle cx="50" cy="50" r="6" fill="#0a0a0c" />
          </svg>
        );
      }

      /* ━━━ NAV ━━━ */
      const TABS = ["COLLECTION", "DISCOVER", "MARKET", "PASSPORT"];
      function Nav({ tab, setTab }) {
        return (
          <div
            style={{
              ...glass(0.03),
              borderRadius: 14,
              padding: "10px 16px",
            }}
            className="flex items-center justify-between"
          >
            <TopHighlight radius={14} />
            <div className="flex items-center gap-2.5">
              <Logo />
              <span
                style={{
                  fontSize: 12,
                  fontWeight: 500,
                  letterSpacing: "0.18em",
                  color: "rgba(255,255,255,0.82)",
                }}
              >
                POXY WORLD
              </span>
            </div>
            <div className="flex items-center gap-5">
              {TABS.map((t) => (
                <button
                  key={t}
                  onClick={() => setTab(t)}
                  style={{
                    fontSize: 10,
                    letterSpacing: "0.18em",
                    background: "none",
                    border: "none",
                    cursor: "pointer",
                    padding: 0,
                    transition: "opacity 200ms ease, color 200ms ease",
                    color:
                      tab === t
                        ? "rgba(255,255,255,0.78)"
                        : "rgba(255,255,255,0.24)",
                  }}
                >
                  {t}
                </button>
              ))}
            </div>
          </div>
        );
      }

      /* ━━━ COLLECTION ━━━ */
      function Collection({ onOpen }) {
        const [hover, setHover] = useState(null);
        return (
          <div className="crossfade">
            <div
              style={{
                fontSize: 9,
                letterSpacing: "0.22em",
                color: "rgba(255,255,255,0.18)",
                marginBottom: 20,
              }}
            >
              YOUR POXIES · 47
            </div>
            <div className="grid grid-cols-3 gap-3">
              {POXIES.map((p, i) => (
                <div
                  key={p.name}
                  onClick={() => onOpen(p)}
                  onMouseEnter={() => setHover(i)}
                  onMouseLeave={() => setHover(null)}
                  style={{
                    background:
                      hover === i
                        ? "rgba(255,255,255,0.045)"
                        : "rgba(255,255,255,0.025)",
                    border: "0.5px solid rgba(255,255,255,0.07)",
                    borderRadius: 20,
                    padding: "24px 16px 18px",
                    position: "relative",
                    overflow: "hidden",
                    cursor: "pointer",
                    transition: "background 200ms ease, transform 200ms ease",
                    transform:
                      hover === i ? "translateY(-2px)" : "translateY(0)",
                  }}
                  className="flex flex-col items-center"
                >
                  <TopHighlight radius={20} />
                  <Glow
                    rarity={p.rarity}
                    w={130}
                    h={90}
                    opacity={0.2}
                    blur={32}
                    bottom={"6px"}
                  />
                  <Gem rarity={p.rarity} size={72} />
                  <div
                    style={{
                      fontSize: 14,
                      fontWeight: 500,
                      color: "rgba(255,255,255,0.86)",
                      marginTop: 16,
                      marginBottom: 10,
                    }}
                  >
                    {p.name}
                  </div>
                  <RarityBadge rarity={p.rarity} />
                </div>
              ))}
            </div>
          </div>
        );
      }

      /* ━━━ DISCOVER ━━━ */
      function Discover() {
        const [t, setT] = useState(0);
        useEffect(() => {
          const target = Date.now() + 1000 * 60 * 60 * 8 + 1000 * 60 * 23 + 1000 * 41;
          const id = setInterval(() => setT(target - Date.now()), 1000);
          setT(target - Date.now());
          return () => clearInterval(id);
        }, []);
        const s = Math.max(0, Math.floor(t / 1000));
        const hh = String(Math.floor(s / 3600)).padStart(2, "0");
        const mm = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return (
          <div className="crossfade flex justify-center">
            <div
              style={{
                ...glass(0.025),
                borderRadius: 24,
                padding: 48,
                maxWidth: 420,
                width: "100%",
              }}
              className="flex flex-col items-center text-center"
            >
              <TopHighlight radius={24} />
              <div
                style={{
                  fontSize: 9,
                  letterSpacing: "0.22em",
                  color: "rgba(255,255,255,0.18)",
                  marginBottom: 20,
                }}
              >
                NEXT DROP
              </div>
              <div
                className="font-mono"
                style={{
                  fontSize: 32,
                  color: "rgba(255,255,255,0.8)",
                  letterSpacing: "0.04em",
                }}
              >
                {hh}:{mm}:{ss}
              </div>
              <div
                style={{
                  fontSize: 12,
                  fontStyle: "italic",
                  color: "rgba(255,255,255,0.38)",
                  marginTop: 18,
                  lineHeight: 1.6,
                }}
              >
                Halcyon — a Mythic poxy awaits the patient.
              </div>
            </div>
          </div>
        );
      }

      /* ━━━ MARKET ━━━ */
      function Market() {
        return (
          <div className="crossfade flex justify-center">
            <div
              style={{
                ...glass(0.025),
                borderRadius: 16,
                padding: "8px 20px",
                maxWidth: 520,
                width: "100%",
              }}
            >
              <TopHighlight radius={16} />
              {MARKET.map((m, i) => (
                <div
                  key={m.name}
                  className="flex items-center gap-3"
                  style={{
                    padding: "16px 0",
                    borderBottom:
                      i < MARKET.length - 1
                        ? "0.5px solid rgba(255,255,255,0.045)"
                        : "none",
                  }}
                >
                  <div style={{ width: 36, height: 36, position: "relative" }}>
                    <Gem rarity={m.rarity} size={36} />
                  </div>
                  <div
                    style={{
                      fontSize: 13,
                      fontWeight: 500,
                      color: "rgba(255,255,255,0.86)",
                      minWidth: 70,
                    }}
                  >
                    {m.name}
                  </div>
                  <RarityBadge rarity={m.rarity} />
                  <div className="flex-1" />
                  <div
                    className="font-mono"
                    style={{ fontSize: 12, color: hexA("#ef9f27", 0.85) }}
                  >
                    {m.price} PX
                  </div>
                  <GhostButton>BUY</GhostButton>
                </div>
              ))}
            </div>
          </div>
        );
      }

      /* ━━━ PASSPORT (user) ━━━ */
      function Passport({ onOpen }) {
        const prized = POXIES[0];
        return (
          <div className="crossfade flex justify-center">
            <div
              style={{
                ...glass(0.025),
                borderRadius: 24,
                padding: 24,
                maxWidth: 420,
                width: "100%",
              }}
            >
              <TopHighlight radius={24} />
              <div className="flex items-center gap-4">
                <div
                  style={{
                    width: 48,
                    height: 48,
                    borderRadius: "50%",
                    background: "rgba(255,255,255,0.045)",
                    border: "0.5px solid rgba(255,255,255,0.08)",
                    fontSize: 13,
                    fontWeight: 500,
                    color: "rgba(255,255,255,0.7)",
                  }}
                  className="flex items-center justify-center"
                >
                  KV
                </div>
                <div>
                  <div
                    style={{
                      fontSize: 14,
                      fontWeight: 500,
                      color: "rgba(255,255,255,0.86)",
                    }}
                  >
                    kvoss
                  </div>
                  <div
                    style={{
                      fontSize: 11,
                      color: "rgba(255,255,255,0.38)",
                      marginTop: 3,
                    }}
                  >
                    47 owned · rarest: Mythic
                  </div>
                </div>
              </div>

              <div
                style={{
                  fontSize: 9,
                  letterSpacing: "0.22em",
                  color: "rgba(255,255,255,0.18)",
                  margin: "24px 0 12px",
                }}
              >
                MOST PRIZED
              </div>
              <div
                onClick={() => onOpen(prized)}
                style={{
                  ...glass(0.03),
                  borderRadius: 16,
                  padding: 16,
                  cursor: "pointer",
                  overflow: "hidden",
                }}
                className="flex items-center gap-4"
              >
                <TopHighlight radius={16} />
                <div style={{ position: "relative", width: 56, height: 56 }}>
                  <Glow
                    rarity={prized.rarity}
                    w={80}
                    h={60}
                    opacity={0.2}
                    blur={24}
                    bottom={"-4px"}
                  />
                  <Gem rarity={prized.rarity} size={56} />
                </div>
                <div>
                  <div
                    style={{
                      fontSize: 14,
                      fontWeight: 500,
                      color: "rgba(255,255,255,0.88)",
                      marginBottom: 8,
                    }}
                  >
                    {prized.name}
                  </div>
                  <RarityBadge rarity={prized.rarity} />
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ━━━ BUTTONS ━━━ */
      function GhostButton({ children, onClick }) {
        return (
          <button
            onClick={onClick}
            style={{
              fontSize: 9,
              letterSpacing: "0.2em",
              padding: "8px 14px",
              borderRadius: 12,
              background: "rgba(255,255,255,0.03)",
              border: "0.5px solid rgba(255,255,255,0.08)",
              color: "rgba(255,255,255,0.6)",
              cursor: "pointer",
              transition: "background 200ms ease",
            }}
            onMouseEnter={(e) =>
              (e.currentTarget.style.background = "rgba(255,255,255,0.06)")
            }
            onMouseLeave={(e) =>
              (e.currentTarget.style.background = "rgba(255,255,255,0.03)")
            }
          >
            {children}
          </button>
        );
      }

      /* ━━━ PASSPORT MODAL ━━━ */
      function Modal({ poxy, onClose }) {
        const [tab, setTab] = useState("IDENTITY");
        const c = RARITY[poxy.rarity].color;
        return (
          <div
            onClick={onClose}
            className="fade-in"
            style={{
              position: "fixed",
              inset: 0,
              zIndex: 50,
              background: "rgba(0,0,0,0.6)",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              padding: 16,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="modal-in"
              style={{
                maxWidth: 340,
                width: "100%",
                background: "rgba(14,13,20,0.94)",
                border: "0.5px solid rgba(255,255,255,0.1)",
                borderRadius: 24,
                position: "relative",
                overflow: "hidden",
              }}
            >
              <TopHighlight radius={24} color="rgba(255,255,255,0.14)" />

              {/* HERO */}
              <div
                style={{ padding: "32px 24px 24px", position: "relative" }}
                className="flex flex-col items-center"
              >
                <Glow
                  rarity={poxy.rarity}
                  w={200}
                  h={160}
                  opacity={0.2}
                  blur={55}
                  bottom={"30px"}
                />
                <Gem rarity={poxy.rarity} size={90} />
                <div
                  style={{
                    fontSize: 20,
                    fontWeight: 500,
                    color: "rgba(255,255,255,0.9)",
                    marginTop: 18,
                    marginBottom: 12,
                  }}
                >
                  {poxy.name}
                </div>
                <RarityBadge rarity={poxy.rarity} />
              </div>

              {/* INNER TABS */}
              <div
                className="flex"
                style={{ borderBottom: "0.5px solid rgba(255,255,255,0.06)" }}
              >
                {["IDENTITY", "DNA", "LORE"].map((t) => (
                  <button
                    key={t}
                    onClick={() => setTab(t)}
                    style={{
                      flex: 1,
                      fontSize: 9,
                      letterSpacing: "0.2em",
                      padding: "12px 0",
                      background: "none",
                      border: "none",
                      borderBottom:
                        tab === t
                          ? `1px solid ${hexA(c, 0.6)}`
                          : "1px solid transparent",
                      marginBottom: -0.5,
                      cursor: "pointer",
                      transition: "color 200ms ease",
                      color:
                        tab === t
                          ? "rgba(255,255,255,0.78)"
                          : "rgba(255,255,255,0.24)",
                    }}
                  >
                    {t}
                  </button>
                ))}
              </div>

              {/* TAB CONTENT */}
              <div style={{ padding: "8px 24px 4px", minHeight: 168 }}>
                {tab === "IDENTITY" && (
                  <div className="crossfade">
                    <Field label="Serial" mono>
                      {poxy.serial}
                    </Field>
                    <Field label="Rarity" color={c}>
                      {poxy.rarity}
                    </Field>
                    <Field label="Traits">
                      <div className="flex gap-1.5 flex-wrap justify-end">
                        {poxy.traits.map((t) => (
                          <span
                            key={t}
                            style={{
                              fontSize: 9,
                              padding: "3px 8px",
                              borderRadius: 20,
                              background: "rgba(255,255,255,0.04)",
                              border: "0.5px solid rgba(255,255,255,0.08)",
                              color: "rgba(255,255,255,0.6)",
                            }}
                          >
                            {t}
                          </span>
                        ))}
                      </div>
                    </Field>
                    <Field label="Minted">{poxy.minted}</Field>
                    <Field label="Owner" mono last>
                      {poxy.owner}
                    </Field>
                  </div>
                )}

                {tab === "DNA" && (
                  <div className="crossfade" style={{ padding: "16px 0" }}>
                    <div
                      style={{
                        fontSize: 9,
                        letterSpacing: "0.2em",
                        color: "rgba(255,255,255,0.22)",
                        marginBottom: 8,
                      }}
                    >
                      SHA-256
                    </div>
                    <div
                      className="font-mono"
                      style={{
                        fontSize: 10,
                        color: "rgba(255,255,255,0.3)",
                        wordBreak: "break-all",
                        lineHeight: 1.7,
                        marginBottom: 20,
                      }}
                    >
                      {poxy.hash}
                    </div>
                    {poxy.traits.map((t, i) => {
                      const order = ["Common", "Uncommon", "Rare", "Epic", "Legendary", "Mythic"];
                      const pct = RARITY[order[Math.max(0, order.indexOf(poxy.rarity) - i)] || "Common"].pct;
                      return (
                        <div key={t} style={{ marginBottom: 12 }}>
                          <div
                            className="flex justify-between"
                            style={{ marginBottom: 5 }}
                          >
                            <span
                              style={{
                                fontSize: 10,
                                color: "rgba(255,255,255,0.5)",
                              }}
                            >
                              {t}
                            </span>
                            <span
                              className="font-mono"
                              style={{
                                fontSize: 10,
                                color: "rgba(255,255,255,0.32)",
                              }}
                            >
                              {pct}%
                            </span>
                          </div>
                          <div
                            style={{
                              height: 4,
                              borderRadius: 4,
                              background: "rgba(255,255,255,0.06)",
                              overflow: "hidden",
                            }}
                          >
                            <div
                              style={{
                                height: "100%",
                                width: pct + "%",
                                background: hexA(c, 0.5),
                                borderRadius: 4,
                              }}
                            />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {tab === "LORE" && (
                  <div className="crossfade" style={{ padding: "16px 0" }}>
                    <div
                      style={{
                        height: 1,
                        background: "rgba(255,255,255,0.05)",
                        marginBottom: 16,
                      }}
                    />
                    <p
                      style={{
                        fontSize: 12,
                        fontStyle: "italic",
                        color: "rgba(255,255,255,0.38)",
                        lineHeight: 1.75,
                        margin: 0,
                      }}
                    >
                      {poxy.lore}
                    </p>
                  </div>
                )}
              </div>

              {/* ACTIONS */}
              <div
                className="flex gap-2"
                style={{ padding: "8px 20px 20px" }}
              >
                <button style={ghostFull()}>SHARE</button>
                <button
                  style={{
                    flex: 1,
                    fontSize: 9,
                    letterSpacing: "0.2em",
                    padding: "12px 0",
                    borderRadius: 12,
                    background: hexA(c, 0.12),
                    border: `0.5px solid ${hexA(c, 0.2)}`,
                    color: hexA(c, 0.85),
                    cursor: "pointer",
                  }}
                >
                  LIST FOR SALE
                </button>
              </div>
            </div>
          </div>
        );
      }

      function ghostFull() {
        return {
          flex: 1,
          fontSize: 9,
          letterSpacing: "0.2em",
          padding: "12px 0",
          borderRadius: 12,
          background: "rgba(255,255,255,0.03)",
          border: "0.5px solid rgba(255,255,255,0.08)",
          color: "rgba(255,255,255,0.6)",
          cursor: "pointer",
        };
      }

      function Field({ label, children, mono, color, last }) {
        return (
          <div
            className="flex items-center justify-between gap-4"
            style={{
              padding: "12px 0",
              borderBottom: last
                ? "none"
                : "0.5px solid rgba(255,255,255,0.045)",
            }}
          >
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.26)" }}>
              {label}
            </span>
            <span
              className={mono ? "font-mono" : ""}
              style={{
                fontSize: 11,
                textAlign: "right",
                color: color
                  ? hexA(color, 0.85)
                  : mono
                  ? "rgba(255,255,255,0.32)"
                  : "rgba(255,255,255,0.72)",
              }}
            >
              {children}
            </span>
          </div>
        );
      }

      /* ━━━ APP ━━━ */
      function App() {
        const [tab, setTab] = useState("COLLECTION");
        const [active, setActive] = useState(null);
        return (
          <div style={{ minHeight: "100vh", position: "relative" }}>
            <Ambient />
            <main
              style={{
                position: "relative",
                zIndex: 1,
                maxWidth: 720,
                margin: "0 auto",
                padding: "20px 16px 80px",
              }}
            >
              <Nav tab={tab} setTab={setTab} />
              <div style={{ marginTop: 28 }}>
                {tab === "COLLECTION" && <Collection onOpen={setActive} />}
                {tab === "DISCOVER" && <Discover />}
                {tab === "MARKET" && <Market />}
                {tab === "PASSPORT" && <Passport onOpen={setActive} />}
              </div>
            </main>
            {active && <Modal poxy={active} onClose={() => setActive(null)} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
