<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lumina OS</title>
  <script>
    (function () {
      var base = location.pathname.replace(/\/lumina-os\/?.*$/i, '') || '';
      if (base && !base.endsWith('/')) base += '/';
      if (!base) base = '/';
      var q = location.search || '';
      location.replace(base + '#/lumina-os' + q);
    })();
  </script>
</head>
<body>
  <p>Redirecting to Lumina OS…</p>
</body>
</html>
