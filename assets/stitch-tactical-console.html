<!DOCTYPE html>

<style>
        /* Ambient Background Logic */
        body {
            background-color: #050506;
            color: #e5e2e3;
            overflow-x: hidden;
            font-family: 'Roboto Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            pointer-events: none;
            z-index: 0;
            filter: blur(120px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Tactical Utility Classes */
        .tactical-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
        }
        
        .micro-grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 16px 16px;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative selection:bg-hotfix-accent selection:text-white font-mono">
<div class="ambient-glow"></div>
<!-- TopNavBar -->
<nav class="bg-surface-glass dark:bg-surface-glass backdrop-blur-[20px] border-b border-border-glass shadow-none fixed top-0 w-full z-50 transition-transform duration-300 h-16">
</nav>
<!-- Main Canvas -->
<main class="flex-grow pt-32 pb-stack-lg px-margin-mobile md:px-margin-desktop w-full max-w-[1600px] mx-auto relative z-10 flex flex-col justify-center items-center">
<!-- Compressed Master Widget -->
<div class="relative w-full max-w-6xl mx-auto bg-[#050506] border border-white/5 p-6 overflow-hidden flex flex-col xl:flex-row gap-8 justify-between items-end rounded-xl">
<!-- Micro-Grid Texture Layer -->
<div class="absolute inset-0 micro-grid-bg pointer-events-none z-0"></div>
<div class="absolute inset-0 bg-gradient-to-t from-[#050506]/80 to-transparent pointer-events-none z-0"></div>
<!-- Technical Corner Ticks -->
<!-- LEFT ZONE (Telemetry & Metrics) -->
<div class="relative z-10 flex flex-col gap-6 flex-grow w-full">
<!-- Upper Row: Tier Caps -->
<div class="flex flex-wrap items-center gap-3">
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-white/15 bg-white/5 text-primary transition-all duration-200 rounded-full">
                ALL
            </button>
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-transparent text-white/40 hover:text-white hover:border-white/10 transition-all duration-200 rounded-full">
                COMMON
            </button>
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-transparent text-white/40 hover:text-white hover:border-white/10 transition-all duration-200 rounded-full">
                UNCOMMON
            </button>
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-transparent text-white/40 hover:text-white hover:border-white/10 transition-all duration-200 rounded-full">
                RARE
            </button>
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-transparent text-white/40 hover:text-white hover:border-white/10 transition-all duration-200 rounded-full">
                EPIC
            </button>
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-transparent text-white/40 hover:text-white hover:border-white/10 transition-all duration-200 rounded-full">
                LEGENDARY
            </button>
<button class="font-label-lg text-[11px] px-3 py-1.5 border border-transparent text-white/40 hover:text-white hover:border-white/10 transition-all duration-200 rounded-full">
                MYTHIC
            </button>
</div>
<!-- Lower Row: Diagnostics -->
<div class="flex flex-col md:flex-row items-start md:items-center gap-6">
<!-- Status Stream -->
<div class="flex items-center gap-3 text-white/40 bg-white/5 px-4 py-2 border border-white/5 rounded-full">
<span class="material-symbols-outlined text-[14px]">local_fire_department</span>
<span class="font-label-lg text-[11px]">BURN <span class="material-symbols-outlined text-[12px] mx-1">arrow_forward</span> PC</span>
</div>
<!-- Counters -->
<div class="flex flex-wrap gap-2">
<div class="bg-[#050506] border border-white/10 px-3 py-1.5 flex items-center gap-2 rounded-full">
<span class="font-label-lg text-[10px] text-white/40">COMMON</span>
<span class="font-label-lg text-[10px] text-primary">0.10</span>
</div>
<div class="bg-[#050506] border border-white/10 px-3 py-1.5 flex items-center gap-2 rounded-full">
<span class="font-label-lg text-[10px] text-white/40">MYTHIC</span>
<span class="font-label-lg text-[10px] text-primary">40</span>
</div>
<div class="bg-[#050506] border border-white/10 px-3 py-1.5 flex items-center gap-2 rounded-full">
<span class="font-label-lg text-[10px] text-white/40">SECRET</span>
<span class="font-label-lg text-[10px] text-primary">100</span>
</div>
</div>
</div>
</div>
<!-- RIGHT ZONE (Action Power-Block) -->
<div class="relative z-10 flex flex-col gap-6 w-full xl:w-[480px] shrink-0">
<!-- Top-Right: Utilities -->
<div class="flex items-center xl:justify-end gap-3">
<button class="font-label-lg text-[11px] px-3 py-1.5 bg-[#050506] border border-white/10 text-white/40 hover:text-white hover:bg-white/5 transition-all duration-200 rounded-full">
                SELECT MULTIPLE
            </button>
<button class="flex items-center gap-2 font-label-lg text-[11px] px-3 py-1.5 bg-[#050506] border border-white/10 text-white/40 hover:text-white hover:bg-white/5 transition-all duration-200 rounded-full">
<span class="material-symbols-outlined text-[14px]">sort</span>
<span>SORT: DEFAULT</span>
</button>
</div>
<!-- Bottom-Right: Triggers -->
<div class="grid grid-cols-2 gap-3">
<button class="border border-red-500/20 text-red-400/80 bg-[#050506] hover:bg-red-500/10 transition-colors uppercase font-label-lg tracking-wider py-3.5 flex items-center justify-center gap-2 rounded-lg">
<span class="material-symbols-outlined text-[16px]">local_fire_department</span>
                BURN
            </button>
<button class="border border-white/10 text-white/90 bg-white/5 hover:bg-white/10 transition-colors uppercase font-label-lg tracking-wider py-3.5 flex items-center justify-center gap-2 text-[11px] rounded-lg">
                CRAFT <span class="opacity-50">|</span> [5x CMN <span class="material-symbols-outlined text-[12px]">arrow_forward</span> 1x UNC]
            </button>
</div>
</div>
</div>
</main>
<!-- Footer -->
</body></html>
